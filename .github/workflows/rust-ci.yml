# Portfolio Website Builder — Rust CI (Phase 0 sketch)
# Phase 1: `cargo test --workspace` runs engine + golden parity tests.
# Phase 2: add `cargo tauri build` on macos-latest + windows-latest.

name: Rust CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.77"
      - name: cargo test --workspace
        run: cargo test --workspace --all-targets
