<section class="intro section section-gradient scroll-reveal scroll-reveal--immediate"{{ SectionIDAttr|safe }}><div class="container center">{% if Title %}<h1 id="intro_title">{{ Title }}</h1>{% endif %}{% for p in Paragraphs %}<p>{{ p }}</p>{% endfor %}{% if HasPre %}<pre class="intro__pre code-block">{{ Pre }}</pre>{% endif %}{% if CtaURL %}<p class="intro__cta-wrap"><a class="intro__cta" href="{{ CtaURL }}"{{ CtaAttrs|safe }}>{{ CtaLabel }}</a></p>{% endif %}{% if HasLinkButtons %}<div class="intro__link-section"><h2 class="intro__link-section-title">{{ LinkButtonsTitle }}</h2><div class="intro__link-buttons">{{ LinkButtonsHTML|safe }}</div></div>{% endif %}</div></section>
