{# Reuses catalog-carousel.js: root [data-catalog-carousel] + .catalog-carousel__* classes as apps_showcase swiper. #}
<section class="media-swiper-widget section section-gradient scroll-reveal" data-widget-type="media_swiper" aria-label="{{ AriaLabel }}">
  <div class="container">
    <div class="catalog-carousel" data-catalog-carousel role="region" aria-roledescription="carousel" aria-label="{{ AriaLabel }}">
      <button class="catalog-carousel__arrow catalog-carousel__arrow--prev" type="button" aria-label="Previous slide">‹</button>
      <div class="catalog-carousel__viewport">
        <div class="catalog-carousel__track">
          {% for slide in Slides %}
          <div class="catalog-carousel__slide">
            <img class="catalog-carousel__img" src="{{ slide.Src }}" alt="{{ slide.Alt }}" loading="lazy" decoding="async">
          </div>
          {% endfor %}
        </div>
      </div>
      <button class="catalog-carousel__arrow catalog-carousel__arrow--next" type="button" aria-label="Next slide">›</button>
    </div>
  </div>
</section>
