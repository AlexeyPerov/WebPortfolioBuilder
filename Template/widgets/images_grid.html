<section class="photos section section-gradient scroll-reveal" id="photos"><div class="container">{% if Title %}<h2 id="photos_title" class="center">{{ Title }}</h2>{% endif %}<div class="photos-grid" data-image-lightbox>{% for img in Images %}<button type="button" class="photos-grid__item" data-lightbox-src="{{ img.Src }}" data-lightbox-alt="{{ img.Alt }}"><img src="{{ img.Src }}" alt="{{ img.Alt }}"></button>{% endfor %}</div></div></section>
