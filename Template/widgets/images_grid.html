{{define "images_grid"}}<section class="photos section section-gradient scroll-reveal" id="photos"><div class="container">{{if .Title}}<h2 id="photos_title" class="center">{{.Title}}</h2>{{end}}<div class="photos-grid" data-image-lightbox>{{range .Images}}<button type="button" class="photos-grid__item" data-lightbox-src="{{.Src}}" data-lightbox-alt="{{.Alt}}"><img src="{{.Src}}" alt="{{.Alt}}"></button>{{end}}</div></div></section>{{end}}
