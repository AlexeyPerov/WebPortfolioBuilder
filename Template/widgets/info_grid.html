{{define "info_grid"}}<section class="offers section section-gradient scroll-reveal" id="offers"><div class="container">{{if .Title}}<h2 id="offers_title" class="center">{{.Title}}</h2>{{end}}<div class="offers-grid">{{range .Items}}<article class="offer-card">{{if .Image}}<img class="offer-card__image" src="{{.Image}}" alt="{{.ImageAlt}}">{{end}}{{if .Title}}<h3>{{.Title}}</h3>{{end}}{{if .Text}}<p>{{.Text}}</p>{{end}}</article>{{end}}</div></div></section>{{end}}
