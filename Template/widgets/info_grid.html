<section class="offers section section-gradient scroll-reveal" id="offers"><div class="container">{% if Title %}<h2 id="offers_title" class="center">{{ Title }}</h2>{% endif %}<div class="offers-grid">{% for item in Items %}<article class="offer-card">{% if item.Image %}<img class="offer-card__image" src="{{ item.Image }}" alt="{{ item.ImageAlt }}">{% endif %}{% if item.Title %}<h3>{{ item.Title }}</h3>{% endif %}{% if item.Text %}<p>{{ item.Text }}</p>{% endif %}</article>{% endfor %}</div></div></section>
