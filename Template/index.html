<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{site_title}}</title>
  <link rel="icon" type="image/png" href="{{site_icon}}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="{{typography_google_fonts_href}}" rel="stylesheet">
  <style>
    :root {
      --font-heading: {{typography_font_heading}};
      --font-body: {{typography_font_body}};
      --page-bg: {{theme_page_bg}};
      --surface: {{theme_surface}};
      --surface-strong: {{theme_surface_strong}};
      --text-primary: {{theme_text_primary}};
      --text-secondary: {{theme_text_secondary}};
      --accent: {{theme_accent}};
      --line: {{theme_line}};
      --widget-gradient: {{theme_widget_gradient}};
      --cover-background: {{theme_cover_background}};
      --intro-gradient: {{theme_intro_gradient}};
      --catalog-gradient: {{theme_catalog_gradient}};
      --offers-gradient: {{theme_offers_gradient}};
      --photos-gradient: {{theme_photos_gradient}};
      --vacancies-gradient: {{theme_vacancies_gradient}};
      --follow-us-gradient: {{theme_follow_us_gradient}};
      --footer-gradient: {{theme_footer_gradient}};
      --store-icon-height: {{store_icon_height}};
    }
  </style>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <noscript>
    <style>
      .scroll-reveal,
      .scroll-reveal.scroll-reveal--visible {
        opacity: 1 !important;
        transform: none !important;
      }
    </style>
  </noscript>
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <div class="brand-row">
          {{header_brand_row}}
        </div>
        {{header_nav}}
      </div>
    </div>
  </header>

  {{cover_banner_section}}

  <main>
{{main_sections}}
  </main>

  {{footer_html}}
  {{widgets_config_script}}
  <script src="scroll-reveal.js" defer></script>
  <script src="catalog-carousel.js" defer></script>
  <script src="split-widget.js" defer></script>
</body>
</html>
